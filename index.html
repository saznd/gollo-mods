/* ============================= */
/* MENÚ - NUEVO DISEÑO MODERNO Y ELEGANTE */
/* ============================= */

.menu-wrapper{
  width: 100%;
  margin-top: 40px;
  display: flex;
  justify-content: center;
  padding: 0;
}

.menu {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
  flex-wrap: wrap;
  background: transparent;
  padding: 0;
  border: none;
  box-shadow: none;
  backdrop-filter: none;
}

/* Botones rediseñados: forma de píldora, borde neón, efecto glassmorphism */
.menu button {
  position: relative;
  background: rgba(20, 20, 30, 0.65);
  backdrop-filter: blur(10px);
  color: white;
  border: none;
  padding: 12px 32px;
  cursor: pointer;
  font-weight: bold;
  text-transform: uppercase;
  font-family: "Orbitronht", sans-serif;
  font-size: 15px;
  letter-spacing: 2px;
  border-radius: 60px;
  transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  overflow: hidden;
  z-index: 1;
}

/* Efecto de brillo neón en los bordes */
.menu button::before {
  content: '';
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -2px;
  background: linear-gradient(45deg, #ffffff, #aaaaaa, #ffffff, #888888);
  border-radius: 62px;
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: -2;
}

.menu button::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.2);
  border-radius: 58px;
  z-index: -1;
  transition: all 0.3s ease;
}

/* Hover: efecto de elevación y neón */
.menu button:hover {
  transform: translateY(-5px) scale(1.02);
  background: rgba(35, 35, 50, 0.85);
  letter-spacing: 2.5px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 15px rgba(255,255,255,0.3);
}

.menu button:hover::before {
  opacity: 0.6;
}

/* Botón activo (seleccionado) con estilo destacado */
.menu button.activo {
  background: rgba(255, 255, 255, 0.95);
  color: #000000;
  text-shadow: none;
  box-shadow: 0 0 20px rgba(255,255,255,0.8), 0 8px 20px rgba(0,0,0,0.3);
  letter-spacing: 2.5px;
}

.menu button.activo::before {
  opacity: 0.9;
  background: linear-gradient(45deg, #ffffff, #dddddd, #ffffff);
}

.menu button.activo::after {
  background: rgba(255,255,255,0.2);
}

/* Efecto de "click" */
.menu button:active {
  transform: translateY(2px) scale(0.98);
  transition: 0.05s;
}

/* Responsive: botones más compactos en móvil */
@media (max-width: 768px) {
  .menu {
    gap: 15px;
  }
  .menu button {

    font-size: 12px;

}

/* ============================= */
/* STAFF */
/* ============================= */

.staff{

  justify-content: center;
  gap: 35px;
  max-width: 1200px;

.card{

  max-width: 360px;
  height: 280px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(4px);
  transition: all 0.4s ease;
  gap: 18px;
  position: relative;
  overflow: hidden;
  margin: 0 auto;
  border-radius: 16px;
}

.card:hover{
  transform: translateY(-8px);
  background: rgba(0, 0, 0, 0.6);
  border: 1px solid rgba(255,255,255,0.8);
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

.card::before,
.aporte-card::before {
  content: "";
  position: absolute;
  top: 0;
  left: -150%;
  width: 120%;
  height: 100%;
  background: linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.35) 45%, rgba(255,255,255,0) 100%);
  filter: blur(18px);
  transform: skew(-15deg);
  opacity: 0;
  transition: opacity 0.4s ease;
}

.card:hover::before,
.aporte-card:hover::before {
  opacity: 1;
  animation: flash 1.4s ease;
}

@keyframes flash {
  0% { left: -150%; }
  100% { left: 150%; }
}

  const seccionMostrar = document.getElementById(id);
  if (seccionMostrar) {
    if (id === 'equipo' || id === 'aportes' || id === 'datas' || id === 'descargas') {
      seccionMostrar.style.display = "grid";
    } else {
      seccionMostrar.style.display = "block";
    }
  }
  document.querySelectorAll(".menu button").forEach(b => b.classList.remove("activo"));
  if (boton) boton.classList.add("activo");
}

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".seccion").forEach(s => s.style.display = "none");
  const equipoSeccion = document.getElementById("equipo");
  if (equipoSeccion) equipoSeccion.style.display = "grid";
  const botones = document.querySelectorAll(".menu button");
  if (botones.length > 0) {
    botones.forEach(b => b.classList.remove("activo"));
    botones[0].classList.add("activo");
  }
});
</script>

</body>
