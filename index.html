<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>GOLLO MODS | B&W</title>
<link rel="icon" type="image/png" href="img/akala.png">
<style>
  /* RESET + BASE - BLANCO Y NEGRO TOTAL */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background-color: #000;
    color: #fff;
    font-family: 'Orbitronht', 'Courier New', monospace;
    overflow-x: hidden;
    position: relative;
    min-height: 100vh;
  }

  /* VIDEO DE FONDO (blanco y negro, alto contraste, brillante y notable) */
  #bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -3;
    pointer-events: none;
    filter: grayscale(100%) contrast(1.4) brightness(1.15);
  }

  /* Capa oscura ligera para mantener legibilidad */
  .video-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.55);
    z-index: -2;
    pointer-events: none;
  }

  .contenido-principal {
    position: relative;
    z-index: 10;
    padding-bottom: 60px;
  }

  /* HEADER */
  .hero {
    text-align: center;
    padding-top: 50px;
    padding-bottom: 20px;
  }

  .titulo {
    font-family: 'Ethnocentric', sans-serif;
    font-size: 64px;
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 0 0 8px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.5);
    font-weight: 900;
  }

  .subtitulo {
    margin-top: 12px;
    font-size: 13px;
    letter-spacing: 3px;
    color: #ccc;
    background: rgba(0,0,0,0.6);
    display: inline-block;
    padding: 6px 18px;
    border-radius: 40px;
    backdrop-filter: blur(4px);
    text-transform: uppercase;
  }

  /* MENÚ SOLO DOS BOTONES: INICIO y APORTES */
  .menu-wrapper {
    width: 100%;
    margin-top: 45px;
    display: flex;
    justify-content: center;
    padding: 0 16px;
  }

  .menu {
    background: rgba(20, 20, 20, 0.9);
    backdrop-filter: blur(10px);
    padding: 14px 28px;
    border-radius: 60px;
    border: 1px solid #444;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    max-width: 500px;
    margin: 0 auto;
  }

  .menu button {
    background: #111;
    border: 1px solid #555;
    color: #eee;
    padding: 12px 32px;
    border-radius: 50px;
    font-family: "Orbitronht", monospace;
    font-weight: bold;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
  }

  .menu button:hover {
    background: #333;
    color: white;
    border-color: #aaa;
    transform: translateY(-2px);
  }

  .menu button.activo {
    background: #fff;
    color: #000;
    border-color: #fff;
    box-shadow: 0 0 12px rgba(255,255,255,0.6);
    font-weight: bold;
  }

  /* STAFF VERTICAL (UNO ARRIBA DEL OTRO) */
  .staff-vertical {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    max-width: 400px;
    margin: 60px auto;
    padding: 20px 10px;
  }

  .miembro-vertical {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    transition: transform 0.2s;
  }

  .miembro-vertical:hover {
    transform: scale(1.02);
  }

  .circle-avatar-bw {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 0 20px rgba(255,255,255,0.5);
    overflow: hidden;
    background: #000;
  }

  .circle-avatar-bw img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(100%);
  }

  .miembro-nombre-bw {
    font-family: "Ethnocentric", sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 6px 20px;
    border-radius: 40px;
    border: 1px solid #aaa;
    backdrop-filter: blur(4px);
  }

  .miembro-role-bw {
    font-size: 12px;
    color: #ccc;
    font-family: monospace;
    letter-spacing: 1.5px;
    background: rgba(0,0,0,0.5);
    padding: 4px 16px;
    border-radius: 30px;
  }

  /* SECCIONES */
  .seccion {
    display: none;
    width: 100%;
  }

  #inicio {
    display: block;
  }

  /* APORTES GRID */
  .aportes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 320px));
    justify-content: center;
    gap: 30px;
    width: 95%;
    max-width: 1200px;
    margin: 60px auto 40px auto;
  }

  .aporte-card {
    background: rgba(10, 10, 10, 0.9);
    backdrop-filter: blur(6px);
    border: 1px solid #444;
    border-radius: 24px;
    padding: 18px;
    transition: all 0.25s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.6);
  }

  .aporte-card:hover {
    transform: translateY(-6px);
    border-color: #fff;
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
  }

  .aporte-card h3 {
    color: #fff;
    font-family: "Ethnocentric", sans-serif;
    font-size: 20px;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  .creator, .password, .peso {
    font-family: monospace;
    font-size: 13px;
    margin: 6px 0;
    color: #ddd;
  }

  .verde { color: #aaa; font-weight: bold; }
  .rojo { color: #aaa; font-weight: bold; }

  .video-thumb {
    margin: 12px 0;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #555;
  }

  .video-thumb img {
    width: 100%;
    display: block;
    filter: grayscale(100%);
  }

  .btn-descarga {
    display: block;
    text-align: center;
    background: #111;
    color: #eee;
    padding: 12px;
    border-radius: 40px;
    text-decoration: none;
    font-weight: bold;
    letter-spacing: 1.5px;
    transition: all 0.25s;
    border: 1px solid #555;
    font-family: monospace;
  }

  .btn-descarga:hover {
    background: #333;
    border-color: #fff;
    color: white;
    letter-spacing: 2px;
  }

  /* RESPONSIVE */
  @media (max-width: 650px) {
    .titulo {
      font-size: 44px;
    }
    .menu button {
      padding: 8px 24px;
      font-size: 14px;
    }
    .circle-avatar-bw {
      width: 120px;
      height: 120px;
    }
    .miembro-nombre-bw {
      font-size: 16px;
    }
  }

  @media (max-width: 480px) {
    .titulo {
      font-size: 34px;
    }
    .menu {
      gap: 15px;
      padding: 12px 20px;
    }
    .menu button {
      padding: 6px 18px;
      font-size: 12px;
    }
  }
</style>
</head>
<body>

<!-- VIDEO DE FONDO -->

  <source src="https://cdn.discordapp.com/attachments/1509117295493120191/1511555430281777172/KRIS_R_GEEZYDEE_-_TUKI_TUKI__HD.mp4?ex=6a20e131&is=6a1f8fb1&hm=bf305d60b482fd6677edf61253af777c41f012a3ed3e37feb96f05fa4be35223&" type="video/mp4">

<div class="contenido-principal">

  <!-- SECCIÓN APORTES (SOLO G4 Y KING OF KINGS - ELIMINADO Rutf Shit y GTA A1) -->

</div>

<script>
  // Función para mostrar secciones (solo INICIO y APORTES)
  function mostrarSeccion(id, boton) {
    const secciones = document.querySelectorAll('.seccion');
    secciones.forEach(sec => sec.style.display = 'none');
    const seccionActiva = document.getElementById(id);
    if (seccionActiva) {
      if (id === 'inicio') {
        seccionActiva.style.display = 'block';
      } else if (id === 'aportes') {
        seccionActiva.style.display = 'grid';
      }
    }
    // actualizar clase activa en botones
    const botones = document.querySelectorAll('.menu button');
    botones.forEach(btn => btn.classList.remove('activo'));
    boton.classList.add('activo');
  }

  // Inicializar: mostrar INICIO (staff vertical)
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.seccion').forEach(sec => sec.style.display = 'none');
    const inicioDiv = document.getElementById('inicio');
    if (inicioDiv) inicioDiv.style.display = 'block';
    const primerBoton = document.querySelector('.menu button');
    if (primerBoton) primerBoton.classList.add('activo');
  });
</script>

</body>
</html>
