body {

/* ========== CURSOR PERSONALIZADO GAMING ========== */
.cursor-dot {
  width: 8px;
  height: 8px;
  background: #ffffff;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.1s ease;
  box-shadow: 0 0 8px rgba(255,255,255,0.8);
}

.cursor-ring {
  width: 32px;
  height: 32px;
  border: 2px solid rgba(255,255,255,0.7);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  transition: all 0.15s ease;
  box-shadow: 0 0 12px rgba(255,255,255,0.4);

/* ========== VIDEO DE FONDO - MÁS NOTABLE Y VIBRANTE ========== */
#video-fondo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  z-index: -3;
  pointer-events: none;
  /* Mejoras para hacer el video más visible y vibrante */
  filter: brightness(1.15) contrast(1.25) saturate(1.35);
  transform: scale(1);
  background-color: #0a0a0a;
}

/* Overlay mucho más sutil para que el video destaque */
.overlay-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.65) 100%);
  z-index: -2;
  pointer-events: none;
}

/* Partículas sutiles pero visibles sobre el video */
.particles-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
}

/* Niebla más ligera para no opacar el video */
.fog-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(120deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.02) 200px, rgba(0,0,0,0.12) 400px);
  z-index: -1;
  pointer-events: none;
  animation: fogMove 25s linear infinite;
  opacity: 0.4;
}

@keyframes fogMove {
  0% { background-position: 0 0; }
  100% { background-position: 500px 300px; }

.parallax-section {

.avatar-glow {

.avatar-glow .ring {

  100% { opacity: 0.8; box-shadow: 0 0 35px rgba(255,215,0,0.9); width: calc(100% + 24px); height: calc(100% + 24px);}
}
