<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLLO MODS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
}

/* VIDEO */

#video-fondo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    z-index:-1;
}

/* PANTALLA INGRESAR */

.welcome-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    transition:0.5s;
    pointer-events:all;
}

.welcome-card{
    text-align:center;
    padding:40px;
    width:90%;
    max-width:500px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(0,0,0,0.6);
}

.welcome-card h1{
    font-size:3rem;
    font-family:'Space Grotesk',sans-serif;
    margin-bottom:20px;
}

.welcome-card p{
    color:#aaa;
    margin-bottom:40px;
    letter-spacing:2px;
}

.btn-ingresar{
    padding:15px 40px;
    border:none;
    background:#fff;
    color:#000;
    font-weight:800;
    cursor:pointer;
    font-size:1rem;
    transition:0.3s;
}

.btn-ingresar:hover{
    transform:scale(1.05);
}

/* CONTENIDO */

#main-content{
    display:none;
}

.hero{
    text-align:center;
    padding-top:60px;
}

.titulo{
    font-size:4rem;
    font-family:'Space Grotesk',sans-serif;
    font-weight:800;
}

.subtitulo{
    margin-top:15px;
    color:#ccc;
    letter-spacing:4px;
}

/* MENU */

.menu{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:40px;
    flex-wrap:wrap;
}

.menu button{
    padding:12px 30px;
    border:1px solid #fff;
    background:transparent;
    color:#fff;
    cursor:pointer;
    font-weight:700;
    transition:0.3s;
}

.menu button:hover{
    background:#fff;
    color:#000;
}

.menu button.activo{
    background:#fff;
    color:#000;
}

/* STAFF */

#equipo{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:40px;
    max-width:1100px;
    margin:70px auto;
    padding:20px;
}

.staff-card{
    text-align:center;
}

.staff-card img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:50%;
    border:3px solid #fff;
}

.staff-name{
    margin-top:20px;
    font-size:1.5rem;
    font-weight:700;
}

.staff-role{
    margin-top:10px;
    color:#aaa;
}

/* GTAS */

#aportes{
    display:none;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
    max-width:1300px;
    margin:70px auto;
    padding:20px;
}

.card{
    background:#111;
    border:1px solid rgba(255,255,255,0.2);
    padding:20px;
}

.card img{
    width:100%;
    margin-top:20px;
}

.card h3{
    font-size:2rem;
}

.btn-descarga{
    display:block;
    margin-top:25px;
    text-align:center;
    padding:14px;
    background:#fff;
    color:#000;
    text-decoration:none;
    font-weight:800;
}

/* RESPONSIVE */

@media(max-width:700px){

    .titulo{
        font-size:2.5rem;
    }

    .welcome-card h1{
        font-size:2rem;
    }

}

</style>
</head>
<body>

<!-- VIDEO -->

<video autoplay muted loop playsinline id="video-fondo">
    <source src="https://cdn.discordapp.com/attachments/1406502394837074097/1506439017741156413/KRIS_R_GEEZYDEE_-_TUKI_TUKI__HD.mp4" type="video/mp4">
</video>

<div class="overlay-video"></div>

<!-- PANTALLA INGRESAR -->

<div id="welcomeOverlay" class="welcome-overlay">

    <div class="welcome-card">

        <h1>𝖌𝖔𝖑𝖑𝖔 𝖒𝖔𝖉𝖘</h1>

        <p>⚠️ LA REVOLUCIÓN TE ESPERA ⚠️</p>

        <button type="button" id="ingresarBtn" class="btn-ingresar">
            INGRESAR
        </button>

    </div>

</div>

<!-- CONTENIDO -->

<div id="main-content">

    <div class="hero">

        <div class="titulo">𝖌𝖔𝖑𝖑𝖔 𝖒𝖔𝖉𝖘</div>

        <div class="subtitulo">
            LA REVOLUCIÓN HA INICIADO
        </div>

        <div class="menu">

            <button class="activo" onclick="mostrar('equipo', this)">
                OWNERS
            </button>

            <button onclick="mostrar('aportes', this)">
                GTAS
            </button>

        </div>

    </div>

    <!-- OWNERS -->

    <div id="equipo" class="seccion">

        <div class="staff-card">
            <img src="https://cdn.discordapp.com/attachments/1406502394837074097/1506438853911646239/1779090598965.jpg" alt="">
            <div class="staff-name">SANTI</div>
            <div class="staff-role">OWNER</div>
        </div>

        <div class="staff-card">
            <img src="https://cdn.discordapp.com/avatars/1125573441563664414/e65942c4af8e588121d42d802d8e8329.png?size=1024" alt="">
            <div class="staff-name">ANDREW</div>
            <div class="staff-role">OWNER</div>
        </div>

        <div class="staff-card">
            <img src="https://cdn.discordapp.com/avatars/1203105008384614432/efbc96daa7868944422e509778ca3054.png?size=1024" alt="">
            <div class="staff-name">BETRAYEDD</div>
            <div class="staff-role">OWNER</div>
        </div>

    </div>

    <!-- GTAS -->

    <div id="aportes" class="seccion">

        <div class="card">

            <h3>RG4</h3>

            <p>CREADOR: SANTI</p>

            <p>PESO: 232MB</p>

            <img src="https://cdn.discordapp.com/attachments/1406502394837074097/1506436114997710878/sa-mp-000.png" alt="">

            <a href="https://www.mediafire.com/file/5irvsg00ar6mbgf/RG4.rar/file" class="btn-descarga">
                DESCARGAR
            </a>

        </div>

    </div>

</div>

<script>

window.onload = function(){

    const ingresarBtn = document.getElementById("ingresarBtn");

    const welcomeOverlay = document.getElementById("welcomeOverlay");

    const mainContent = document.getElementById("main-content");

    ingresarBtn.addEventListener("click", function(){

        welcomeOverlay.style.opacity = "0";

        setTimeout(function(){

            welcomeOverlay.style.display = "none";

            mainContent.style.display = "block";

        }, 500);

    });

}

function mostrar(id, boton){

    document.querySelectorAll(".seccion").forEach(function(sec){

        sec.style.display = "none";

    });

    const seccion = document.getElementById(id);

    if(seccion){

        if(id === "equipo"){

            seccion.style.display = "grid";

        }else{

            seccion.style.display = "grid";

        }

    }

    document.querySelectorAll(".menu button").forEach(function(btn){

        btn.classList.remove("activo");

    });

    boton.classList.add("activo");

}

</script>

</body>
</html>
